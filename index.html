<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewelpa — Diamond Watch Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8D5A3;--gold-dark:#8B6914;--gold-glow:rgba(201,168,76,0.18);
  --cream:#FAF7F2;--ink:#1A1714;--muted:#7A7265;
  --border:rgba(201,168,76,0.28);--white:#FFFFFF;--surface:#F5F1EA;--danger:#C0392B;
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}

/* ── HEADER ── */
.site-header{background:linear-gradient(135deg,#1A1714 0%,#231f1a 60%,#1A1714 100%);padding:0 48px;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(201,168,76,0.35);box-shadow:0 4px 32px rgba(0,0,0,0.45)}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
.logo-sub{font-size:9px;letter-spacing:3px;color:var(--gold-light);text-transform:uppercase;margin-top:-2px;opacity:.7}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#dbb954,#C9A84C);color:var(--ink);border:none;padding:9px 22px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 2px 14px rgba(201,168,76,0.35)}
.btn-gold:hover{background:linear-gradient(135deg,#dbb954,#e8c860,#dbb954);box-shadow:0 4px 20px rgba(201,168,76,0.5)}.btn-gold:disabled{opacity:.55;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,0.55);padding:9px 22px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:rgba(201,168,76,.12);border-color:var(--gold)}

/* ── TABS ── */
.tabs{background:linear-gradient(135deg,#1A1714 0%,#231f1a 100%);padding:0 48px;display:flex;border-bottom:1px solid rgba(201,168,76,.2)}
.tab-btn{background:none;border:none;color:rgba(255,255,255,.38);font-family:'Inter',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:13px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn:hover{color:var(--gold-light)}.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}

/* ── CATALOG TOOLBAR ── */
.catalog-toolbar{padding:20px 48px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{background:var(--white);border:1px solid var(--border);color:var(--muted);padding:6px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.filter-btn:hover,.filter-btn.active{background:var(--ink);color:var(--gold);border-color:var(--ink)}
.stats-row{font-size:11px;color:var(--muted);letter-spacing:1px}

/* ── CATALOG GRID ── */
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px;padding:0 48px 48px}
.watch-card{background:var(--white);position:relative;overflow:hidden;border:1px solid rgba(201,168,76,.12);transition:all .25s;box-shadow:0 2px 16px rgba(0,0,0,0.06)}
.watch-card:hover{transform:translateY(-4px);box-shadow:0 14px 44px rgba(0,0,0,.12),0 0 0 1px rgba(201,168,76,.2)}
.watch-card.featured::after{content:'FEATURED';position:absolute;top:14px;right:-24px;background:linear-gradient(90deg,#C9A84C,#dbb954);color:var(--ink);font-size:8px;font-weight:700;letter-spacing:1.5px;padding:4px 30px;transform:rotate(45deg);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.card-img{width:100%;height:260px;overflow:hidden;background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.watch-card:hover .card-img img{transform:scale(1.04)}
.card-img-ph{width:100%;height:260px;background:linear-gradient(145deg,#f0ebe0,#e8e0d0);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.card-body{padding:14px 16px 13px;border-top:1px solid rgba(201,168,76,.1)}
.card-brand{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.card-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--ink);margin-bottom:3px;line-height:1.2}
.card-ref{font-size:10px;color:var(--muted);letter-spacing:.8px;margin-bottom:12px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink)}
.card-acts{display:flex;gap:6px}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;color:var(--muted)}
.icon-btn:hover{border-color:var(--danger);color:var(--danger)}.icon-btn.edit:hover{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;padding:80px;grid-column:1/-1}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--muted);margin-bottom:8px}
.empty p{font-size:12px;color:var(--muted)}

/* ── PDF PREVIEW TAB ── */
#view-pdf{padding:20px 28px;background:linear-gradient(180deg,#e8e4dc 0%,#f0ece4 100%);min-height:100vh}
.pdf-notice{background:var(--ink);color:var(--gold-light);padding:12px 22px;font-size:12px;margin-bottom:24px;display:flex;align-items:center;gap:10px;letter-spacing:.4px;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
.pdf-notice strong{color:var(--gold)}
#pdf-pages-wrap{display:flex;flex-direction:column;gap:28px;align-items:center}

/* ══════════════════════════════════
   SLIDE: 1280 x 720 px (16:9)
══════════════════════════════════ */
.slide{width:1280px;height:720px;overflow:hidden;position:relative;flex-shrink:0;box-shadow:0 8px 48px rgba(0,0,0,.38),0 2px 8px rgba(0,0,0,.2),0 0 0 1px rgba(201,168,76,.12)}

/* ── SLIDE: COVER ── */
.sl-cover{background:radial-gradient(ellipse at 60% 40%,#2a2319 0%,#1A1714 55%,#130f0c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center}
.sl-cover-stripe{position:absolute;inset:0;opacity:.03;background-size:28px 28px}
.sl-cover-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none}
.sl-cover-border{position:absolute;inset:20px;border:1px solid rgba(201,168,76,.2);pointer-events:none}
.sl-cover-border2{position:absolute;inset:26px;border:1px solid rgba(201,168,76,.07);pointer-events:none}
.sl-cover-inner{position:relative;z-index:2;text-align:center}
.sl-cover-est{font-size:17px;letter-spacing:7px;color:#C9A84C;text-transform:uppercase;margin-bottom:22px;opacity:.7}
.sl-cover-title{font-family:'Cormorant Garamond',serif;font-size:96px;font-weight:600;color:#C9A84C;letter-spacing:12px;text-transform:uppercase;line-height:1;margin-bottom:2px}
.sl-cover-sub{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:rgba(255,255,255,.38);letter-spacing:3px;margin-bottom:36px}
.sl-cover-rule{width:90px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);margin:0 auto 22px;opacity:.7}
.sl-cover-desc{font-size:15px;letter-spacing:4px;color:rgba(241, 241, 241, 0.25);text-transform:uppercase;margin-bottom:14px}
.sl-cover-brands{font-size:15px;letter-spacing:3px;color:rgba(236, 236, 234, 0.45);text-transform:uppercase}
.sl-cover-foot{position:absolute;bottom:32px;left:0;right:0;text-align:center;font-size:15px;letter-spacing:4px;color:rgba(218, 211, 211, 0.815);text-transform:uppercase}
.sl-cover-corner{position:absolute;width:40px;height:40px;opacity:.3}
.sl-cover-corner.tl{top:30px;left:30px;border-top:1px solid #C9A84C;border-left:1px solid #C9A84C}
.sl-cover-corner.tr{top:30px;right:30px;border-top:1px solid #C9A84C;border-right:1px solid #C9A84C}
.sl-cover-corner.bl{bottom:30px;left:30px;border-bottom:1px solid #C9A84C;border-left:1px solid #C9A84C}
.sl-cover-corner.br{bottom:30px;right:30px;border-bottom:1px solid #C9A84C;border-right:1px solid #C9A84C}

/* ── SLIDE: INNER ── */
.sl-inner{background:linear-gradient(160deg,#ffffff 0%,#faf7f2 40%,#f5f1ea 100%);display:flex;flex-direction:column;position:relative}
.sl-inner::before{content:'';position:absolute;top:0;right:0;width:380px;height:380px;background:radial-gradient(ellipse at top right,rgba(201,168,76,0.06) 0%,transparent 65%);pointer-events:none}
.sl-inner::after{content:'';position:absolute;bottom:0;left:0;width:280px;height:200px;background:radial-gradient(ellipse at bottom left,rgba(201,168,76,0.04) 0%,transparent 70%);pointer-events:none}
.sl-header{display:flex;align-items:center;justify-content:space-between;padding:20px 48px 14px;border-bottom:1px solid rgba(201,168,76,.2);flex-shrink:0;position:relative;z-index:2;background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0) 100%)}
.sl-logo{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:#8B6914;letter-spacing:5px;text-transform:uppercase}
.sl-pnum{font-size:15px;letter-spacing:2px;color:#a1a0a0;text-transform:uppercase}
.sl-header-divider{display:flex;align-items:center;gap:14px;padding:0 48px 12px;position:relative;z-index:2}
.sl-header-divider::before,.sl-header-divider::after{content:'';height:1px;flex:1;background:linear-gradient(90deg,transparent,#C9A84C,transparent)}
.sl-header-divider span{width:7px;height:7px;transform:rotate(45deg);background:#C9A84C;flex:0 0 auto;box-shadow:0 0 0 2px rgba(201,168,76,.12)}
.sl-hed{padding:16px 48px 0;flex-shrink:0;position:relative;z-index:2}
.sl-hed-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;color:#1A1714;margin-bottom:3px}
.sl-hed-bar{font-size:19px;letter-spacing:3px;color:#8B6914;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sl-hed-bar::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,#C9A84C,transparent)}

/* 4-col grid inside slide */
.sl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 48px 14px;flex:1;align-content:center;position:relative;z-index:2}
.sl-item{border:1px solid rgba(201,168,76,.18);overflow:hidden;display:flex;flex-direction:column;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);position:relative;transition:all .2s}
.sl-item::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(26,23,20,0.04) 100%);pointer-events:none;z-index:1}
.sl-item-img{width:100%;height:275px;background:linear-gradient(145deg,#f5f1ea,#ede8df);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.sl-item-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(26,23,20,0.18) 100%);pointer-events:none}
.sl-item-img img{width:100%;height:100%;object-fit:cover;display:block}
.sl-item-body{padding:7px 11px 6px;flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#fff 0%,#faf7f2 100%)}
.sl-item-brand{font-size:10px;letter-spacing:3px;color:#8B6914;text-transform:uppercase;margin-bottom:2px}
.sl-item-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:#1A1714;margin-bottom:2px;line-height:1.12}
.sl-item-ref{font-size:13px;color:#1111114d;letter-spacing:.6px;margin-bottom:6px}
.sl-item-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(201,168,76,.15);padding-top:5px;margin-top:auto}
.sl-item-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#1A1714}
.badge-a{font-size:8px;letter-spacing:1.5px;color:#3a7d50;border:1px solid rgba(58,125,80,.3);padding:2px 7px;text-transform:uppercase;background:rgba(58,125,80,.06)}
.badge-r{font-size:8px;letter-spacing:1.5px;color:#8B6914;border:1px solid rgba(201,168,76,.4);padding:2px 7px;text-transform:uppercase;background:rgba(201,168,76,.06)}
.badge-s{font-size:8px;letter-spacing:1.5px;color:#aaa;border:1px solid #ddd;padding:2px 7px;text-transform:uppercase;background:rgba(0,0,0,.03)}

/* Side stripe on slide */
.sl-side-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,transparent,#C9A84C 30%,#C9A84C 70%,transparent);opacity:.4}

/* ── SLIDE: BACK COVER ── */
.sl-back{background:radial-gradient(ellipse at 40% 55%,#262018 0%,#1A1714 55%,#100d0b 100%) !important;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px;position:relative}
.sl-back-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:450px;background:radial-gradient(ellipse,rgba(201,168,76,0.07) 0%,transparent 65%);pointer-events:none}
.sl-back-logo{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:600;color:#C9A84C;letter-spacing:7px;text-transform:uppercase;margin-bottom:6px}
.sl-back-tag{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:rgba(255,255,255,.32);margin-bottom:36px;letter-spacing:1px}
.sl-back-rule{width:70px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);margin:0 auto 28px;opacity:.6}
.sl-back-contacts{display:flex;gap:64px;justify-content:center;position:relative;z-index:2}
.sl-back-col{text-align:left}
.sl-back-row{display:flex;gap:12px;font-size:13px;color:rgba(255,255,255,.45);margin-bottom:10px;align-items:baseline}
.sl-back-row b{color:#E8D5A3;font-size:9px;letter-spacing:2px;text-transform:uppercase;min-width:56px}
.sl-back-copy{position:absolute;bottom:32px;font-size:12px;letter-spacing:3px;color:rgba(247, 240, 240, 0.336);text-transform:uppercase}
.sl-back-divider{width:1px;background:linear-gradient(180deg,transparent,rgba(201,168,76,.25),transparent);align-self:stretch}

/* ── MODAL ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(26,23,20,.88);z-index:200;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.4),0 0 0 1px rgba(201,168,76,.15)}
.modal-hd{background:linear-gradient(135deg,#1A1714,#231f1a);padding:22px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,168,76,.2)}
.modal-hd-title{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--gold);letter-spacing:1px}
.modal-hd-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:22px;cursor:pointer;line-height:1;transition:color .2s}
.modal-hd-close:hover{color:#fff}
.modal-bd{padding:28px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:500}
.fi,.fs,.ft{width:100%;border:1px solid rgba(0,0,0,.12);padding:10px 13px;font-family:'Inter',sans-serif;font-size:13px;background:var(--cream);color:var(--ink);outline:none;transition:border-color .2s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.ft{height:70px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.upload-zone{border:2px dashed rgba(201,168,76,.35);padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--cream);position:relative}
.upload-zone:hover{border-color:var(--gold);background:#fff;box-shadow:inset 0 0 0 1px rgba(201,168,76,.1)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-txt{font-size:12px;color:var(--muted);pointer-events:none}
.upload-prev{max-height:150px;max-width:100%;margin:0 auto;display:block}
.upload-ico{font-size:26px;color:var(--gold);margin-bottom:7px}
.modal-ft{padding:18px 30px;border-top:1px solid rgba(201,168,76,.12);display:flex;justify-content:flex-end;gap:10px;background:linear-gradient(90deg,#faf7f2,#fff)}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:linear-gradient(135deg,#1A1714,#231f1a);color:var(--gold);padding:13px 22px;font-size:12px;letter-spacing:1px;z-index:9999;transform:translateY(72px);opacity:0;transition:all .3s;border-left:3px solid var(--gold);pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.toast.show{transform:translateY(0);opacity:1}
.print-only{display:none}
@media print{
  @page{size:landscape;margin:8mm}
  body{background:#fff}
  body *{visibility:hidden !important}
  #view-pdf, #view-pdf *{visibility:visible !important}
  .site-header,.tabs,.catalog-toolbar,.modal-backdrop,.toast{display:none !important}
  #view-pdf{display:block !important;position:absolute;inset:0;padding:0 !important;min-height:100vh !important;background:#fff !important}
  .pdf-notice{display:none !important}
  #pdf-pages-wrap{gap:0 !important;align-items:stretch !important;display:block !important}
  #pdf-pages-wrap .slide{break-after:page;page-break-after:always;box-shadow:none !important;transform:none !important;margin:0 auto 0 !important;page-break-inside:avoid;overflow:visible !important}
  #pdf-pages-wrap .slide:last-child{break-after:auto;page-break-after:auto}
}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--cream)}::-webkit-scrollbar-thumb{background:var(--gold-light)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-area">
    <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
      <polygon points="20,3 37,13 37,27 20,37 3,27 3,13" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
      <polygon points="20,9 31,16 31,24 20,31 9,24 9,16" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.5"/>
      <circle cx="20" cy="20" r="2.8" fill="#C9A84C" opacity="0.9"/>
    </svg>
    <div>
      <div class="logo-text">Jewelpa</div>
      <div class="logo-sub">Diamond &amp; Luxury Timepieces</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" onclick="openAddModal()">+ Add Watch</button>
    <button class="btn-ghost" onclick="printCatalog()">Print / Save PDF</button>
    <button class="btn-gold" id="dl-btn" onclick="downloadPDF()">&#11015; Download PDF</button>
  </div>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('catalog',this)">Catalog</button>
  <button class="tab-btn" onclick="switchTab('pdf',this)">PDF Preview</button>
</nav>

<!-- CATALOG -->
<div id="view-catalog" class="view active">
  <div class="catalog-toolbar">
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterBrand('all',this)">All</button>
      <button class="filter-btn" onclick="filterBrand('AP',this)">AP</button>
      <button class="filter-btn" onclick="filterBrand('Bulgari',this)">Bulgari</button>
      <button class="filter-btn" onclick="filterBrand('Cariter',this)">Cariter</button>
      <button class="filter-btn" onclick="filterBrand('Cartier',this)">Cartier</button>
      <button class="filter-btn" onclick="filterBrand('Casio',this)">Casio</button>
      <button class="filter-btn" onclick="filterBrand('longines',this)">longines</button>
      <button class="filter-btn" onclick="filterBrand('OMEGA',this)">OMEGA</button>
      <button class="filter-btn" onclick="filterBrand('Omega',this)">Omega</button>
      <button class="filter-btn" onclick="filterBrand('RM',this)">RM</button>
      <button class="filter-btn" onclick="filterBrand('Rolex',this)">Rolex</button>
      <button class="filter-btn" onclick="filterBrand('Versace',this)">Versace</button>
    </div>
    <div class="stats-row" id="catalog-stats"></div>
  </div>
  <div class="catalog-grid" id="catalog-grid"></div>
</div>

<!-- PDF PREVIEW -->

function saveBlobAsFile(blob,fileName){
  if(window.navigator && typeof window.navigator.msSaveOrOpenBlob==='function'){
    window.navigator.msSaveOrOpenBlob(blob,fileName);
    return;
  }
  var url=URL.createObjectURL(blob);
  var link=document.createElement('a');
  link.href=url;
  link.download=fileName;
  link.rel='noopener';
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(function(){URL.revokeObjectURL(url)},1000);
}

function loadWatches() {
  var g=document.getElementById('catalog-grid');
  if(g) g.innerHTML='<div class="empty"><h3>Loading watches...</h3><p>Syncing from cloud</p></div>';
  fetch(blobUrl, { headers: { 'Accept': 'application/json' } })
    .then(function(r){return r.json()})
    .then(function(d){
      watches = Array.isArray(d) && d.length > 0 ? d : defaultWatches;
      renderCatalog();
    })
    .catch(function(e){
      console.warn("Cloud sync blocked (likely opened via file://). Falling back to Local Storage.");
      watches = JSON.parse(localStorage.getItem('jwlp4') || '[]');
      if (!watches.length) watches = defaultWatches;
      renderCatalog();
      showToast('Offline Mode: Using local storage (deploy to web to enable cloud sync)');
    });
}

function sv(){
  localStorage.setItem('jwlp4', JSON.stringify(watches));
  fetch(blobUrl, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(watches)
  }).catch(function(e){ 
    console.warn('Cloud sync failed, saved locally instead.'); 
  });
}

/* ── DOWNLOAD PDF ── */
async function downloadPDF(){
  var btn=document.getElementById('dl-btn');
  var originalText=btn.innerHTML;
  btn.textContent='... Generating PDF';
  btn.disabled=true;

  // Save active tab state
  var activeTabBtn=document.querySelector('.tab-btn.active');
  var activeView=document.querySelector('.view.active');

  // Switch to PDF Preview tab to render elements
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  var pdfTabBtn=document.querySelectorAll('.tab-btn')[1];
  var pdfView=document.getElementById('view-pdf');
  pdfTabBtn.classList.add('active');
  pdfView.classList.add('active');

  buildPreview();
  showToast('Generating high-quality PDF...');

  // CRITICAL FIX: Pre-convert all images to base64 Data URLs to bypass html2canvas completely
  var imgs = Array.from(document.querySelectorAll('#pdf-pages-wrap img'));
  await Promise.all(imgs.map(async function(img) {
    var originalSrc = img.src;
    if (originalSrc.startsWith('data:')) return;
    try {
      var res = await fetch(originalSrc);
      if (!res.ok) throw new Error('Fetch failed');
      var blob = await res.blob();
      var reader = new FileReader();
      await new Promise(function(resolve, reject) {
        reader.onloadend = function() {
          img.removeAttribute('crossorigin');
          img.src = reader.result;
          resolve();
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      
      // Wait for browser to process the base64 string
      await new Promise(function(resolve) {
        if (img.complete && img.naturalWidth > 0) resolve();
        else {
          img.onload = resolve;
          img.onerror = resolve;
        }
      });
    } catch(e) {
      console.warn("Failed to load image for PDF:", originalSrc, e);
      if (img.parentNode) img.parentNode.removeChild(img);
    }
  }));

  // Final sanity check: remove any 0x0 images
  document.querySelectorAll('#pdf-pages-wrap img').forEach(function(img) {
    if (img.naturalWidth === 0 || img.naturalHeight === 0) {
      if (img.parentNode) img.parentNode.removeChild(img);
    }
  });

  // Short delay for DOM layout
  await new Promise(function(resolve){setTimeout(resolve, 300)});

  try{
    const { jsPDF } = window.jspdf;
    var pdf=new jsPDF({
      orientation:'landscape',
      unit:'px',
      format:[1280,720],
      compress:true
    });

    var slides=document.querySelectorAll('#pdf-pages-wrap .slide');
    if(slides.length===0){
      throw new Error('No slides found to generate PDF');
    }

    for(var i=0;i<slides.length;i++){
      var slide=slides[i];
      var canvas=await html2canvas(slide,{
        scale:2, // High resolution (2560x1440)
        useCORS:true,
        logging:false,
        backgroundColor:null
      });
      var imgData=canvas.toDataURL('image/jpeg',0.95);
      if(i>0) pdf.addPage([1280,720],'landscape');
      pdf.addImage(imgData,'JPEG',0,0,1280,720);
    }

    pdf.save(exportPdfName);
    showToast('Catalog PDF downloaded!');
  }catch(err){
    console.error('PDF export failed',err);
    alert('PDF export failed: '+err.message);
    showToast('PDF export failed');
  }finally{
    // Restore tab state
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
    document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
    if(activeTabBtn && activeView){
      activeTabBtn.classList.add('active');
      activeView.classList.add('active');
    }else{
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('view-catalog').classList.add('active');
    }
    btn.innerHTML=originalText;
    btn.disabled=false;
  }
}

function printCatalog(){
  var activeTabBtn=document.querySelector('.tab-btn.active');
  var activeView=document.querySelector('.view.active');

  // Switch to PDF Preview tab to render elements
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  var pdfTabBtn=document.querySelectorAll('.tab-btn')[1];
  var pdfView=document.getElementById('view-pdf');
  pdfTabBtn.classList.add('active');
  pdfView.classList.add('active');

  buildPreview();

  var prevTitle=document.title;
  document.title=exportPdfTitle;

  var restore=function(){
    document.title=prevTitle;
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
    document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
    if(activeTabBtn && activeView){
      activeTabBtn.classList.add('active');
      activeView.classList.add('active');
    }else{
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('view-catalog').classList.add('active');
    }
    window.removeEventListener('afterprint',restore);
  };

  window.addEventListener('afterprint',restore);

  // Trigger browser print dialog
  setTimeout(function(){
    window.print();
  },100);
}

function editWatch(id){
  var w=watches.find(function(x){return x.id===id});if(!w)return;
  editId=id;curImg=w.img||'';
  document.getElementById('modal-title').textContent='Edit Watch';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-brand').value=w.brand;
  document.getElementById('f-name').value=w.name;
  document.getElementById('f-ref').value=w.ref||'';
  document.getElementById('f-price').value=w.price;
  document.getElementById('f-material').value=w.material||'';
  document.getElementById('f-diamond').value=w.diamond||'';
  document.getElementById('f-status').value=w.status;
  document.getElementById('f-featured').value=w.featured||'0';
  if(w.img){document.getElementById('img-prev').src=w.img;document.getElementById('img-prev').style.display='block';document.getElementById('upload-ph').style.display='none';}
  else{document.getElementById('img-prev').style.display='none';document.getElementById('upload-ph').style.display='block';}
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal(){document.getElementById('modal-backdrop').classList.remove('open')}
function handleImg(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){curImg=ev.target.result;document.getElementById('img-prev').src=curImg;document.getElementById('img-prev').style.display='block';document.getElementById('upload-ph').style.display='none';};
  r.readAsDataURL(f);
}
function saveWatch(){
  var brand=document.getElementById('f-brand').value.trim();
  var name=document.getElementById('f-name').value.trim();
  var price=document.getElementById('f-price').value.trim();
  if(!brand||!name||!price){showToast('Please fill Brand, Name and Price');return;}
  var w={id:editId||Date.now().toString(),brand,name,
    ref:document.getElementById('f-ref').value.trim(),price,
    material:document.getElementById('f-material').value.trim(),
    diamond:document.getElementById('f-diamond').value.trim(),
    status:document.getElementById('f-status').value,
    featured:document.getElementById('f-featured').value,img:curImg};
  if(editId){var idx=watches.findIndex(function(x){return x.id===editId});if(idx!==-1)watches[idx]=w;showToast('Watch updated');}
  else{watches.push(w);showToast('Watch added!');}
  sv();closeModal();renderCatalog();
}
function delWatch(id){
  if(!confirm('Remove this timepiece?'))return;
  watches=watches.filter(function(w){return w.id!==id});
  sv();renderCatalog();showToast('Watch removed');
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2800);
}
renderCatalog();
